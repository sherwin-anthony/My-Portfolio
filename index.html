<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Sherwin Anthony Rabe, a BS Computer Science fresh graduate focused on junior software developer and full stack developer roles."
    />
    <meta name="author" content="Sherwin Anthony Rabe" />
    <meta
      name="keywords"
      content="Sherwin Anthony Rabe, junior software developer, full stack developer, React, TypeScript, Laravel, computer science portfolio"
    />
    <meta property="og:title" content="Sherwin Anthony Rabe | Junior Software Developer Portfolio" />
    <meta
      property="og:description"
      content="Recruiter-focused developer portfolio showcasing internship experience, full stack projects, and technical skills."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#2563eb" />
    <script>
      (() => {
        const storedTheme = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <title>Sherwin Anthony Rabe | Junior Software Developer Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
